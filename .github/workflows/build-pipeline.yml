name: ${{ github.event.repository.name }} pipeline

on:
  push:
    branches:
      - "**"

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'react-template' }}
  PROJECT_TITLE: ${{ vars.PROJECT_TITLE || 'React Template' }}
  PROJECT_DESCRIPTION: ${{ vars.PROJECT_DESCRIPTION || 'React Template — built from the react-template' }}
  SUBDOMAIN: ${{ vars.SUBDOMAIN || 'react-template' }}
  API_HOSTNAME_PROD: ${{ vars.API_HOSTNAME_PROD || 'api.react-template.ruchij.com' }}
  API_HOSTNAME_STAGING: ${{ vars.API_HOSTNAME_STAGING || 'api.staging.react-template.ruchij.com' }}
  STACK_NAME: ${{ vars.STACK_NAME || 'ReactTemplateFrontEndStack' }}
  GHCR_NAMESPACE: ${{ vars.GHCR_NAMESPACE || 'ruchira088' }}
  AWS_ACCOUNT: ${{ vars.AWS_ACCOUNT || '365562660444' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

jobs:
  transpile-and-test:
    name: Transpile and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize project
        run: |
          node scripts/init-project.mjs <<EOF
          ${{ env.PROJECT_NAME }}
          ${{ env.PROJECT_TITLE }}
          ${{ env.PROJECT_DESCRIPTION }}
          ${{ env.SUBDOMAIN }}
          ${{ env.API_HOSTNAME_PROD }}
          ${{ env.API_HOSTNAME_STAGING }}
          ${{ env.STACK_NAME }}
          ${{ env.GHCR_NAMESPACE }}
          ${{ env.AWS_ACCOUNT }}
          ${{ env.AWS_REGION }}
          EOF

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Execute test suite with coverage
        run: npm run test:coverage

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Vitest Tests
          path: test-results/junit.xml
          reporter: java-junit

      - name: Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: success() || failure()
        with:
          filename: coverage/cobertura-coverage.xml
          badge: true
          format: markdown
          hide_complexity: true
          output: both
          thresholds: "60 80"

      - name: Write Coverage to Summary
        if: success() || failure()
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: coverage-report
          path: coverage/

  upload-bundle:
    name: Upload bundle to S3
    runs-on: ubuntu-latest
    needs:
      - transpile-and-test

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize project
        run: |
          node scripts/init-project.mjs <<EOF
          ${{ env.PROJECT_NAME }}
          ${{ env.PROJECT_TITLE }}
          ${{ env.PROJECT_DESCRIPTION }}
          ${{ env.SUBDOMAIN }}
          ${{ env.API_HOSTNAME_PROD }}
          ${{ env.API_HOSTNAME_STAGING }}
          ${{ env.STACK_NAME }}
          ${{ env.GHCR_NAMESPACE }}
          ${{ env.AWS_ACCOUNT }}
          ${{ env.AWS_REGION }}
          EOF

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: ${{ env.PROJECT_NAME }}-s3-publish
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/github_iam_role"

      - name: Upload bundle to S3
        run: ansible-playbook playbooks/s3-upload.yml

  build-and-publish-docker-image:
    name: Build and Publish Docker image
    runs-on: ubuntu-latest
    needs:
      - transpile-and-test

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize project
        run: |
          node scripts/init-project.mjs <<EOF
          ${{ env.PROJECT_NAME }}
          ${{ env.PROJECT_TITLE }}
          ${{ env.PROJECT_DESCRIPTION }}
          ${{ env.SUBDOMAIN }}
          ${{ env.API_HOSTNAME_PROD }}
          ${{ env.API_HOSTNAME_STAGING }}
          ${{ env.STACK_NAME }}
          ${{ env.GHCR_NAMESPACE }}
          ${{ env.AWS_ACCOUNT }}
          ${{ env.AWS_REGION }}
          EOF

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: ${{ env.PROJECT_NAME }}-docker-publish
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/github_iam_role"

      - name: Build and Publish Docker image
        run: ansible-playbook playbooks/build-and-publish-docker-image.yml

  deploy-to-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs:
      - upload-bundle

    if: github.ref != 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize project
        run: |
          node scripts/init-project.mjs <<EOF
          ${{ env.PROJECT_NAME }}
          ${{ env.PROJECT_TITLE }}
          ${{ env.PROJECT_DESCRIPTION }}
          ${{ env.SUBDOMAIN }}
          ${{ env.API_HOSTNAME_PROD }}
          ${{ env.API_HOSTNAME_STAGING }}
          ${{ env.STACK_NAME }}
          ${{ env.GHCR_NAMESPACE }}
          ${{ env.AWS_ACCOUNT }}
          ${{ env.AWS_REGION }}
          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: ${{ env.PROJECT_NAME }}-dev-deploy
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/github_iam_role"

      - name: Install deploy dependencies
        run: npm ci
        working-directory: cdk-deploy

      - name: Deploy to S3 & Cloudfront
        run: npm run deploy
        working-directory: cdk-deploy

  deploy-to-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs:
      - upload-bundle

    environment: Staging

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize project
        run: |
          node scripts/init-project.mjs <<EOF
          ${{ env.PROJECT_NAME }}
          ${{ env.PROJECT_TITLE }}
          ${{ env.PROJECT_DESCRIPTION }}
          ${{ env.SUBDOMAIN }}
          ${{ env.API_HOSTNAME_PROD }}
          ${{ env.API_HOSTNAME_STAGING }}
          ${{ env.STACK_NAME }}
          ${{ env.GHCR_NAMESPACE }}
          ${{ env.AWS_ACCOUNT }}
          ${{ env.AWS_REGION }}
          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: ${{ env.PROJECT_NAME }}-staging-deploy
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/github_iam_role"

      - name: Install deploy dependencies
        run: npm ci
        working-directory: cdk-deploy

      - name: Deploy to S3 & Cloudfront
        run: npm run deploy
        working-directory: cdk-deploy

  deploy-to-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - deploy-to-staging

    environment: Production

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize project
        run: |
          node scripts/init-project.mjs <<EOF
          ${{ env.PROJECT_NAME }}
          ${{ env.PROJECT_TITLE }}
          ${{ env.PROJECT_DESCRIPTION }}
          ${{ env.SUBDOMAIN }}
          ${{ env.API_HOSTNAME_PROD }}
          ${{ env.API_HOSTNAME_STAGING }}
          ${{ env.STACK_NAME }}
          ${{ env.GHCR_NAMESPACE }}
          ${{ env.AWS_ACCOUNT }}
          ${{ env.AWS_REGION }}
          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: ${{ env.PROJECT_NAME }}-production-deploy
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/github_iam_role"

      - name: Install deploy dependencies
        run: npm ci
        working-directory: cdk-deploy

      - name: Deploy to S3 & Cloudfront
        run: ENVIRONMENT=production npm run deploy
        working-directory: cdk-deploy

      - name: Create GitHub release
        run: ansible-playbook playbooks/github-release.yml

  send-notification:
    runs-on: ubuntu-latest
    if: always()

    permissions:
      id-token: write

    needs:
      - transpile-and-test
      - build-and-publish-docker-image
      - deploy-to-dev
      - deploy-to-staging
      - deploy-to-production

    steps:
      - name: Send Slack notification
        uses: ruchira088/slack-github-action@v1
